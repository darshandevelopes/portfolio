<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darshan Rahate | Backend Engineer & Automation Specialist</title>
    <meta name="description" content="Darshan Rahate — Assistant Systems Engineer at TCS. Specialist in Python, Django, FastAPI, AWS, and workflow automation. 50+ clients worldwide on Fiverr.">
    
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <style>
      :root {
        --font-body: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --bg-primary: #0A0A0A;
        --bg-surface: #111111;
        --bg-card: #141414;
        --text-primary: #EEEEEE;
        --text-muted: #888888;
        --accent: #3B82F6;
        --accent-muted: rgba(59, 130, 246, 0.1);
        --border: #222222;
        --glass: rgba(10, 10, 10, 0.8);
        --space-md: 1rem;
        --space-xl: 4rem;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      [data-theme="light"] {
        --bg-primary: #FAFAFA;
        --bg-surface: #F3F4F6;
        --bg-card: #FFFFFF;
        --text-primary: #111111;
        --text-muted: #666666;
        --accent: #2563EB;
        --accent-muted: rgba(37, 99, 235, 0.1);
        --border: #E5E7EB;
        --glass: rgba(250, 250, 250, 0.8);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body);
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
        transition: background 0.3s, color 0.3s;
      }
      .container { max-width: 1100px; margin: 0 auto; padding: 0 var(--space-md); width: 100%; }
      .section { padding: var(--space-xl) 0; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .fixed { position: fixed; }
      .w-full { width: 100%; }
      .z-50 { z-index: 50; }
      .glass-effect { background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
      .bg-transparent { background: transparent; }
      .py-3 { padding: 0.75rem 0; }
      .py-5 { padding: 1.25rem 0; }
      .transition-all { transition: all 0.3s; }
      .duration-300 { transition-duration: 300ms; }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    </noscript>
    <link rel="canonical" href="https://darshan-rahate.pages.dev">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
